services:
  - type: web
    name: pizzaria-api
    env: docker
    repo: https://github.com/seu-usuario/FullStack-Server
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        scope: run
        value: postgresql://{{ db.user }}:{{ db.password }}@{{ db.host }}:5432/{{ db.database }}
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

databases:
  - name: pizzaria-db
    databaseName: pizzaria
    user: pizzaria_user
    plan: starter
