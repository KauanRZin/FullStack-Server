services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=mongodb://pizzauser:pizzaria123@192.168.1.10:27017/pizzaria?authSource=pizzaria
    restart: unless-stopped

networks:
  default:
    name: pizzaria-network