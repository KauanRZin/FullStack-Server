services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URLy}
    restart: unless-stopped

networks:
  default:
    name: pizzaria-network